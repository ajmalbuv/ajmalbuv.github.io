name: Build and Deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # check:
  #   name: Lint & Type Check
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout 🛎️
  #       uses: actions/checkout@v5

  #     - name: Setup Bun 🚀
  #       uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: latest

  #     - name: Install dependencies 🔧
  #       run: bun install --frozen-lockfile

  #     - name: Biome Lint 🧹
  #       run: bunx @biomejs/biome@2.1.4 ci .

  #     - name: Astro Check 📋
  #       run: bun run astro check

  github-pages:
    name: Deploy to GitHub Pages
    # needs: [check]
    concurrency:
      group: "pages"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Update GitHub Pages site URL 📝
        run: |
          sed -i 's|site:.*|site: "https://ajmalbuv.github.io",|' astro.config.mjs

      - name: Install, build, and upload your site 🚀
        uses: withastro/action@v5
        with:
          # node-version: 24
          package-manager: bun
        env:
          PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}

      - name: Deploy 🚀
        id: deployment
        uses: actions/deploy-pages@v4

  vps-deploy:
    name: Deploy to VPS Branch
    # needs: [check]
    concurrency:
      group: "vps"
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v5

      - name: Update VPS site URL 📝
        run: |
          sed -i 's|site:.*|site: "https://portfolio.ajmalbuv.duckdns.org/",|' astro.config.mjs

      - name: Install and build 🚀
        uses: withastro/action@v5
        with:
          # node-version: 24
          package-manager: bun
        env:
          PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.EMAILJS_TEMPLATE_ID }}

      - name: Push to VPS branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: vps-build
          clean: true
          single-commit: true
